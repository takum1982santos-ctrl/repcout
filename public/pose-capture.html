<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>RepCount – Pose Capture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #090909; color: #fff; font-family: 'Courier New', monospace; min-height: 100dvh; display: flex; flex-direction: column; }
  :root { --acc: #00FF88; }
  #header { background: #111; border-bottom: 1px solid #1e1e1e; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 18px; letter-spacing: 5px; color: var(--acc); }
  #header p  { font-size: 9px; letter-spacing: 3px; color: #333; margin-top: 2px; }
  #statusDot { font-size: 11px; letter-spacing: 2px; color: #ff4444; }
  #camWrap { position: relative; width: 100%; background: #000; }
  #camWrap video { width: 100%; display: block; max-height: 56vw; object-fit: cover; }
  #overlay   { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #flashMsg  { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
               background: rgba(0,0,0,0.8); border: 1px solid var(--acc); border-radius: 10px;
               padding: 14px 28px; font-size: 22px; letter-spacing: 3px; color: var(--acc); white-space: nowrap; }
  #camPlaceholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
                    background: rgba(0,0,0,0.9); font-size: 11px; letter-spacing: 3px; color: #333; text-align: center; }
  #controls { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  #exRow { display: flex; gap: 8px; flex-wrap: wrap; }
  .exBtn { flex: 1 1 calc(50% - 4px); padding: 10px 6px; background: transparent;
           border: 1px solid #2a2a2a; border-radius: 10px; color: #444;
           font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px;
           cursor: pointer; transition: all 0.15s; }
  .exBtn.active { background: rgba(0,255,136,0.08); border-color: var(--acc); color: var(--acc); }
  #camRow { display: flex; gap: 8px; }
  #btnStart { flex: 1; padding: 13px; background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.4);
              border-radius: 12px; color: var(--acc); font-family: 'Courier New',monospace;
              font-size: 12px; letter-spacing: 3px; cursor: pointer; }
  #btnFlip  { padding: 13px 16px; background: transparent; border: 1px solid #2a2a2a;
              border-radius: 12px; color: #555; font-size: 18px; cursor: pointer; }
  #anglesBox { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 12px; }
  #anglesTitle { font-size: 8px; letter-spacing: 4px; color: #333; margin-bottom: 8px; }
  .angleRow { display: flex; justify-content: space-between; align-items: center;
              padding: 5px 0; border-bottom: 1px solid #161616; }
  .angleRow:last-child { border-bottom: none; }
  .angleName { font-size: 9px; letter-spacing: 1px; color: #444; }
  .angleVal  { font-size: 20px; color: var(--acc); font-variant-numeric: tabular-nums; font-weight: bold; }
  .angleConf { font-size: 8px; color: #2a2a2a; margin-left: 3px; }
  #btnCapture { width: 100%; padding: 20px; background: var(--acc); border: none; border-radius: 14px;
                color: #000; font-family: 'Courier New',monospace; font-size: 18px; letter-spacing: 5px;
                font-weight: bold; cursor: pointer; transition: opacity 0.15s; }
  #btnCapture:disabled { opacity: 0.2; cursor: not-allowed; background: #333; }
  #gallery { padding: 0 16px 24px; }
  #galleryTitle { font-size: 8px; letter-spacing: 5px; color: #2a2a2a; margin-bottom: 10px; }
  #galleryRow { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
  .capCard { flex: 0 0 140px; background: #111; border: 1px solid #1e1e1e; border-radius: 10px; overflow: hidden; }
  .capCard img { width: 100%; display: block; }
  .capInfo { padding: 8px; }
  .capEx { font-size: 8px; letter-spacing: 2px; color: var(--acc); margin-bottom: 4px; }
  .capAngLine { display: flex; justify-content: space-between; font-size: 8px; color: #444; }
  .capAngLine span:last-child { color: #777; }
  .btnDl { margin-top: 6px; width: 100%; padding: 6px; background: transparent;
           border: 1px solid #222; border-radius: 6px; color: #444; font-family: 'Courier New',monospace;
           font-size: 8px; letter-spacing: 2px; cursor: pointer; }
  #btnExport { display: none; margin: 0 16px 8px; width: calc(100% - 32px); padding: 12px;
               background: transparent; border: 1px solid #2a2a2a; border-radius: 10px;
               color: #555; font-family: 'Courier New',monospace; font-size: 10px; letter-spacing: 3px; cursor: pointer; }
</style>
</head>
<body>
<div id="header">
  <div><h1>POSE CAPTURE</h1><p>REPCOUNT DIAGNOSTIC TOOL</p></div>
  <div id="statusDot">● INACTIVO</div>
</div>
<div id="camWrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="flashMsg">📸 ¡CAPTURADO!</div>
  <div id="camPlaceholder">TOCÁ "INICIAR"<br/>PARA ACTIVAR LA CÁMARA</div>
</div>
<div id="controls">
  <div id="exRow">
    <button class="exBtn active" data-ex="flexiones">FLEXIONES</button>
    <button class="exBtn" data-ex="zancadas">ZANCADAS</button>
    <button class="exBtn" data-ex="dominadas">DOMINADAS</button>
    <button class="exBtn" data-ex="dips">DIPS</button>
  </div>
  <div id="camRow">
    <button id="btnStart">▶ INICIAR CÁMARA</button>
    <button id="btnFlip">🔄</button>
  </div>
  <div id="anglesBox">
    <div id="anglesTitle">ÁNGULOS EN VIVO</div>
    <div id="noDetect">— sin detección —</div>
  </div>
  <button id="btnCapture" disabled>📸 CAPTURAR</button>
</div>
<button id="btnExport">↓ EXPORTAR DATOS JSON</button>
<div id="gallery" style="display:none">
  <div id="galleryTitle">CAPTURAS</div>
  <div id="galleryRow"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
const KP = {
  leftShoulder:5,rightShoulder:6,leftElbow:7,rightElbow:8,
  leftWrist:9,rightWrist:10,leftHip:11,rightHip:12,
  leftKnee:13,rightKnee:14,leftAnkle:15,rightAnkle:16
};
const BONES=[[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
const EXERCISE_ANGLES={
  flexiones:[
    {name:"Codo Izq",pts:[5,7,9]},{name:"Codo Der",pts:[6,8,10]},
    {name:"Hombro Izq",pts:[7,5,11]},{name:"Hombro Der",pts:[8,6,12]},
    {name:"Cadera",pts:[5,11,13]}],
  zancadas:[
    {name:"Rodilla Izq",pts:[11,13,15]},{name:"Rodilla Der",pts:[12,14,16]},
    {name:"Cadera Izq",pts:[5,11,13]},{name:"Cadera Der",pts:[6,12,14]}],
  dominadas:[
    {name:"Codo Izq",pts:[5,7,9]},{name:"Codo Der",pts:[6,8,10]},
    {name:"Hombro Izq",pts:[7,5,11]},{name:"Hombro Der",pts:[8,6,12]}],
  dips:[
    {name:"Codo Izq",pts:[5,7,9]},{name:"Codo Der",pts:[6,8,10]},
    {name:"Hombro Izq",pts:[7,5,11]},{name:"Hombro Der",pts:[8,6,12]},
    {name:"Cadera",pts:[5,11,13]}]
};
function calcAngle(A,B,C){
  const ab={x:A[0]-B[0],y:A[1]-B[1]},cb={x:C[0]-B[0],y:C[1]-B[1]};
  const dot=ab.x*cb.x+ab.y*cb.y,cross=Math.abs(ab.x*cb.y-ab.y*cb.x);
  return Math.round(Math.atan2(cross,dot)*180/Math.PI);
}
let detector=null,stream=null,rafId=null,status="idle",exercise="flexiones",camFacing="user",lastAngles=[],captures=[];
const vid=document.getElementById("vid"),canvas=document.getElementById("overlay"),ctx=canvas.getContext("2d");
const statusDot=document.getElementById("statusDot"),placeholder=document.getElementById("camPlaceholder");
const flashMsg=document.getElementById("flashMsg"),anglesBox=document.getElementById("anglesBox");
const btnCapture=document.getElementById("btnCapture"),btnStart=document.getElementById("btnStart");
const btnFlip=document.getElementById("btnFlip"),btnExport=document.getElementById("btnExport");
const galleryDiv=document.getElementById("gallery"),galleryRow=document.getElementById("galleryRow");
document.querySelectorAll(".exBtn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".exBtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); exercise=btn.dataset.ex; lastAngles=[]; renderAngles([]);
  });
});
function setStatus(s){
  status=s;
  const labels={idle:"● INACTIVO",loading:"● CARGANDO...",active:"● ACTIVO",error:"● ERROR"};
  const colors={idle:"#ff4444",loading:"#FFD700",active:"#00FF88",error:"#ff4444"};
  statusDot.textContent=labels[s]; statusDot.style.color=colors[s];
  placeholder.style.display=s==="active"?"none":"flex";
  if(s==="loading") placeholder.innerHTML="CARGANDO MOVENET...<br/><small style='font-size:9px;color:#555'>puede tardar 10-20 seg</small>";
  if(s==="error") placeholder.innerHTML="ERROR DE CÁMARA<br/><small style='font-size:9px;color:#555'>verificá permisos en Chrome</small>";
  if(s==="idle") placeholder.innerHTML="TOCÁ \"INICIAR\"<br/>PARA ACTIVAR LA CÁMARA";
  btnCapture.disabled=s!=="active";
  btnStart.textContent=s==="active"?"↺ REINICIAR":"▶ INICIAR CÁMARA";
}
async function startCamera(){
  setStatus("loading");
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    if(rafId) cancelAnimationFrame(rafId);
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing,width:{ideal:640},height:{ideal:480}},audio:false});
    vid.srcObject=stream; await vid.play();
    if(!detector){
      detector=await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
      );
    }
    setStatus("active"); loop();
  }catch(e){ console.error(e); setStatus("error"); }
}
btnStart.addEventListener("click",startCamera);
btnFlip.addEventListener("click",()=>{
  camFacing=camFacing==="user"?"environment":"user";
  if(status==="active") startCamera();
});
async function loop(){
  if(status!=="active") return;
  try{
    if(vid.readyState>=2){
      if(canvas.width!==vid.videoWidth||canvas.height!==vid.videoHeight){
        canvas.width=vid.videoWidth||640; canvas.height=vid.videoHeight||480;
      }
      const poses=await detector.estimatePoses(vid);
      if(poses.length>0){
        const kps=poses[0].keypoints;
        drawSkeleton(kps);
        const angles=getAngles(kps);
        lastAngles=angles; renderAngles(angles);
      }
    }
  }catch(e){}
  rafId=requestAnimationFrame(loop);
}
function drawSkeleton(kps){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  BONES.forEach(([i,j])=>{
    const a=kps[i],b=kps[j];
    if(!a||!b||a.score<0.3||b.score<0.3) return;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle="rgba(0,255,136,0.55)"; ctx.lineWidth=2.5; ctx.stroke();
  });
  kps.forEach(kp=>{
    if(!kp||kp.score<0.3) return;
    ctx.beginPath(); ctx.arc(kp.x,kp.y,5,0,Math.PI*2);
    ctx.fillStyle="#00FF88"; ctx.fill();
  });
  const defs=EXERCISE_ANGLES[exercise]||[];
  defs.forEach(({pts})=>{
    const [a,b,c]=pts,A=kps[a],B=kps[b],C=kps[c];
    if(!A||!B||!C||Math.min(A.score,B.score,C.score)<0.25) return;
    const val=calcAngle([A.x,A.y],[B.x,B.y],[C.x,C.y]);
    ctx.font="bold 14px monospace"; ctx.strokeStyle="#000"; ctx.lineWidth=3;
    ctx.strokeText(val+"°",B.x+6,B.y-6); ctx.fillStyle="#00FF88"; ctx.fillText(val+"°",B.x+6,B.y-6);
  });
}
function getAngles(kps){
  const defs=EXERCISE_ANGLES[exercise]||[];
  return defs.map(({name,pts})=>{
    const [a,b,c]=pts,A=kps[a],B=kps[b],C=kps[c];
    if(!A||!B||!C) return{name,value:null,conf:0};
    const conf=Math.min(A.score,B.score,C.score);
    if(conf<0.2) return{name,value:null,conf:0};
    return{name,value:calcAngle([A.x,A.y],[B.x,B.y],[C.x,C.y]),conf:Math.round(conf*100)};
  });
}
function renderAngles(angles){
  const title=document.getElementById("anglesTitle");
  anglesBox.innerHTML=""; anglesBox.appendChild(title);
  if(!angles||angles.length===0){
    anglesBox.innerHTML+='<div id="noDetect" style="font-size:9px;color:#222;letter-spacing:2px">— sin detección —</div>';
    return;
  }
  angles.forEach(a=>{
    const row=document.createElement("div"); row.className="angleRow";
    row.innerHTML=`<div class="angleName">${a.name}</div><div><span class="angleVal">${a.value!==null?a.value+"°":"—"}</span>${a.conf>0?`<span class="angleConf">${a.conf}%</span>`:""}</div>`;
    anglesBox.appendChild(row);
  });
}
btnCapture.addEventListener("click",()=>{
  const tmp=document.createElement("canvas");
  tmp.width=canvas.width||640; tmp.height=canvas.height||480;
  const tctx=tmp.getContext("2d");
  tctx.drawImage(vid,0,0,tmp.width,tmp.height); tctx.drawImage(canvas,0,0);
  const imgData=tmp.toDataURL("image/jpeg",0.92);
  const capData={timestamp:new Date().toISOString(),exercise,angles:lastAngles};
  captures.unshift({imgData,data:capData,id:Date.now()});
  renderGallery();
  flashMsg.style.display="block";
  setTimeout(()=>flashMsg.style.display="none",1200);
});
function renderGallery(){
  galleryDiv.style.display=captures.length>0?"block":"none";
  btnExport.style.display=captures.length>0?"block":"none";
  galleryRow.innerHTML="";
  captures.forEach(cap=>{
    const card=document.createElement("div"); card.className="capCard";
    const angLines=cap.data.angles.filter(a=>a.value!==null).map(a=>`<div class="capAngLine"><span>${a.name}</span><span>${a.value}°</span></div>`).join("");
    card.innerHTML=`<img src="${cap.imgData}" alt=""/><div class="capInfo"><div class="capEx">${cap.data.exercise.toUpperCase()}</div>${angLines}<button class="btnDl" data-id="${cap.id}">↓ GUARDAR IMG</button></div>`;
    galleryRow.appendChild(card);
  });
  document.querySelectorAll(".btnDl").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const cap=captures.find(c=>c.id==btn.dataset.id);
      if(!cap) return;
      const a=document.createElement("a"); a.href=cap.imgData;
      a.download=`repcount_${cap.data.exercise}_${cap.id}.jpg`; a.click();
    });
  });
}
btnExport.addEventListener("click",()=>{
  const allData=captures.map(c=>c.data);
  const blob=new Blob([JSON.stringify(allData,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`repcount_poses_${Date.now()}.json`; a.click();
});
</script>
</body>
</html
