<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Pose Capture 2.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #090909; color: #fff; font-family: 'Courier New', monospace; min-height: 100dvh; display: flex; flex-direction: column; }
  :root { --acc: #00FF88; }

  /* HEADER */
  #header { background: #111; border-bottom: 1px solid #1e1e1e; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header h1 { font-size: 16px; letter-spacing: 5px; color: var(--acc); }
  #header p  { font-size: 8px; letter-spacing: 3px; color: #333; margin-top: 2px; }
  #statusDot { font-size: 10px; letter-spacing: 2px; white-space: nowrap; }

  /* CAMERA */
  #camWrap { position: relative; width: 100%; background: #000; flex-shrink: 0; }
  #camWrap video { width: 100%; display: block; max-height: 52vw; object-fit: cover; }
  #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #flashMsg { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
              background: rgba(0,0,0,0.88); border-radius: 12px; padding: 14px 28px;
              white-space: nowrap; text-align: center; }
  #flashMsg.countdown { font-size: 72px; color: #ff4444; border: 2px solid #ff4444; }
  #flashMsg.warn      { font-size: 26px; color: #FFD700; border: 1px solid #FFD700; letter-spacing: 3px; }
  #flashMsg.snap      { font-size: 22px; color: var(--acc); border: 1px solid var(--acc); letter-spacing: 3px; }
  #camPlaceholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
                    background: rgba(0,0,0,0.92); font-size: 10px; letter-spacing: 3px; color: #333; text-align: center; line-height: 1.8; }

  /* PROGRESS BAR (shown during session) */
  #progressBar { height: 3px; background: #1a1a1a; flex-shrink: 0; }
  #progressFill { height: 100%; background: var(--acc); width: 0%; transition: width 0.3s; box-shadow: 0 0 8px var(--acc); }

  /* CONTROLS */
  #controls { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }

  /* STEPPER ROW */
  .stepRow { display: flex; align-items: center; justify-content: space-between; background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 10px 14px; }
  .stepLabel { font-size: 9px; letter-spacing: 3px; color: #555; }
  .stepVal   { font-size: 22px; color: var(--acc); min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }
  .stepUnit  { font-size: 8px; color: #333; letter-spacing: 2px; }
  .stepBtns  { display: flex; align-items: center; gap: 6px; }
  .stepBtn   { width: 38px; height: 38px; border-radius: 8px; border: 1px solid #2a2a2a; background: rgba(255,255,255,0.04); color: #888; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.15s; }
  .stepBtn:active { background: rgba(0,255,136,0.12); border-color: var(--acc); color: var(--acc); }

  /* CAMERA ROW */
  #camRow { display: flex; gap: 8px; }
  #btnStart { flex: 1; padding: 13px; background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.4);
              border-radius: 12px; color: var(--acc); font-family: 'Courier New',monospace;
              font-size: 12px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
  #btnStart:disabled { opacity: 0.3; cursor: not-allowed; }
  #btnFlip  { padding: 13px 15px; background: transparent; border: 1px solid #2a2a2a; border-radius: 12px; color: #555; font-size: 18px; cursor: pointer; }

  /* ANGLES BOX */
  #anglesBox { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 10px 12px; }
  .boxTitle  { font-size: 8px; letter-spacing: 4px; color: #333; margin-bottom: 6px; }
  .angleRow  { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #161616; }
  .angleRow:last-child { border-bottom: none; }
  .angleName { font-size: 9px; letter-spacing: 1px; color: #444; }
  .angleVal  { font-size: 18px; color: var(--acc); font-variant-numeric: tabular-nums; font-weight: bold; }
  .angleConf { font-size: 8px; color: #2a2a2a; margin-left: 3px; }

  /* ACTION BUTTONS */
  #btnCapture  { width: 100%; padding: 18px; background: var(--acc); border: none; border-radius: 14px;
                 color: #000; font-family: 'Courier New',monospace; font-size: 16px; letter-spacing: 4px;
                 font-weight: bold; cursor: pointer; transition: opacity 0.15s; }
  #btnCapture:disabled { opacity: 0.2; cursor: not-allowed; background: #333; color: #666; }

  #btnStop    { width: 100%; padding: 14px; background: transparent; border: 1px solid #ff4444; border-radius: 12px;
                color: #ff4444; font-family: 'Courier New',monospace; font-size: 12px; letter-spacing: 3px; cursor: pointer; display: none; }

  #btnDeleteLast { width: 100%; padding: 12px; background: transparent; border: 1px solid #333; border-radius: 12px;
                   color: #555; font-family: 'Courier New',monospace; font-size: 11px; letter-spacing: 3px; cursor: pointer; display: none; transition: all 0.15s; }
  #btnDeleteLast:hover { border-color: #ff4444; color: #ff4444; }

  /* SESSION NAME */
  #nameSection { display: none; flex-direction: column; gap: 8px; }
  #nameSection label { font-size: 8px; letter-spacing: 4px; color: #444; }
  #sessionName { width: 100%; padding: 12px 14px; background: #111; border: 1px solid #2a2a2a;
                 border-radius: 10px; color: var(--acc); font-family: 'Courier New',monospace;
                 font-size: 14px; letter-spacing: 2px; outline: none; }
  #sessionName:focus { border-color: var(--acc); }
  #btnExport  { width: 100%; padding: 14px; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.4);
                border-radius: 12px; color: var(--acc); font-family: 'Courier New',monospace;
                font-size: 12px; letter-spacing: 3px; cursor: pointer; }

  /* GALLERY */
  #gallery { display: none; padding: 0 16px 24px; }
  .galTitle { font-size: 8px; letter-spacing: 5px; color: #2a2a2a; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .galCount  { color: var(--acc); }
  #galleryRow { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
  .capCard   { flex: 0 0 120px; background: #111; border: 1px solid #1e1e1e; border-radius: 10px; overflow: hidden; position: relative; }
  .capCard img { width: 100%; display: block; }
  .capInfo   { padding: 6px 8px; }
  .capIdx    { font-size: 10px; color: var(--acc); letter-spacing: 2px; }
  .capAngLine { font-size: 7px; color: #444; display: flex; justify-content: space-between; margin-top: 2px; }
  .capAngLine span:last-child { color: #666; }
  .capDel    { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); border: 1px solid #ff4444;
               border-radius: 6px; color: #ff4444; font-size: 11px; width: 22px; height: 22px;
               display: flex; align-items: center; justify-content: center; cursor: pointer; }
</style>
</head>
<body>

<div id="header">
  <div><h1>POSE CAPTURE</h1><p>REPCOUNT · MODO LIBRE 2.0</p></div>
  <div id="statusDot" style="color:#ff4444">● INACTIVO</div>
</div>

<div id="progressBar"><div id="progressFill"></div></div>

<div id="camWrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="flashMsg"></div>
  <div id="camPlaceholder">TOCÁ "INICIAR CÁMARA"<br/>PARA COMENZAR</div>
</div>

<div id="controls">

  <!-- STEPPERS -->
  <div class="stepRow">
    <div>
      <div class="stepLabel">FOTOS</div>
    </div>
    <div class="stepBtns">
      <button class="stepBtn" id="btnFotoMinus">−</button>
      <div>
        <div class="stepVal" id="valFotos">10</div>
        <div class="stepUnit" style="text-align:center">capturas</div>
      </div>
      <button class="stepBtn" id="btnFotoPlus">+</button>
    </div>
  </div>

  <div class="stepRow">
    <div>
      <div class="stepLabel">INTERVALO</div>
    </div>
    <div class="stepBtns">
      <button class="stepBtn" id="btnTimeMinus">−</button>
      <div>
        <div class="stepVal" id="valTime">3</div>
        <div class="stepUnit" style="text-align:center">segundos</div>
      </div>
      <button class="stepBtn" id="btnTimePlus">+</button>
    </div>
  </div>

  <!-- CAMERA BUTTONS -->
  <div id="camRow">
    <button id="btnStart">▶ INICIAR CÁMARA</button>
    <button id="btnFlip">🔄</button>
  </div>

  <!-- ANGLES -->
  <div id="anglesBox">
    <div class="boxTitle">ÁNGULOS EN VIVO</div>
    <div id="anglesContent" style="font-size:9px;color:#222;letter-spacing:2px">— sin detección —</div>
  </div>

  <!-- ACTION BUTTONS -->
  <button id="btnCapture" disabled>📸 INICIAR SESIÓN (10s)</button>
  <button id="btnStop">⏹ DETENER SESIÓN</button>
  <button id="btnDeleteLast">× BORRAR ÚLTIMA CAPTURA</button>

  <!-- NAME + EXPORT -->
  <div id="nameSection">
    <label>NOMBRE DE LA SESIÓN</label>
    <input id="sessionName" type="text" placeholder="ej: pistol_squat_perfil" autocomplete="off" spellcheck="false"/>
    <button id="btnExport">↓ DESCARGAR JSON</button>
  </div>

</div>

<!-- GALLERY -->
<div id="gallery">
  <div class="galTitle">
    <span>CAPTURAS</span>
    <span class="galCount" id="galCount">0 / 0</span>
  </div>
  <div id="galleryRow"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
// ── Audio ─────────────────────────────────────────────────────────────────
function playTone(type) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const b = (f, s, d, vol=0.4) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = "sine"; o.frequency.value = f;
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0, ac.currentTime + s);
      g.gain.linearRampToValueAtTime(vol, ac.currentTime + s + 0.01);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + s + d);
      o.start(ac.currentTime + s); o.stop(ac.currentTime + s + d + 0.1);
    };
    const whistle = (offset, dur) => {
      const o = ac.createOscillator(), g = ac.createGain(), lfo = ac.createOscillator(), lg = ac.createGain();
      lfo.frequency.value = 10; lfo.type = "sine"; lg.gain.value = 14;
      lfo.connect(lg); lg.connect(o.frequency);
      o.frequency.value = 3100; o.type = "sine";
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0, ac.currentTime + offset);
      g.gain.linearRampToValueAtTime(0.5, ac.currentTime + offset + 0.02);
      g.gain.setValueAtTime(0.45, ac.currentTime + offset + dur - 0.04);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + offset + dur);
      lfo.start(ac.currentTime + offset); lfo.stop(ac.currentTime + offset + dur + 0.05);
      o.start(ac.currentTime + offset); o.stop(ac.currentTime + offset + dur + 0.05);
    };
    if (type === "countdown") { b(880, 0, 0.08, 0.35); b(880, 0.15, 0.08, 0.35); b(880, 0.30, 0.08, 0.35); }
    if (type === "warn")      { b(1480, 0, 0.1, 0.4); b(1760, 0.15, 0.15, 0.4); }
    if (type === "snap")      { whistle(0, 0.15); }
    if (type === "done")      { whistle(0, 0.5); whistle(0.7, 0.5); whistle(1.4, 0.5); }
    if (type === "delete")    { b(220, 0, 0.2, 0.25, "sawtooth"); }
  } catch(e) {}
}

// ── Keypoints ─────────────────────────────────────────────────────────────
const BONES = [[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];

function calcAngle(A, B, C) {
  const ab = { x:A[0]-B[0], y:A[1]-B[1] };
  const cb = { x:C[0]-B[0], y:C[1]-B[1] };
  return Math.round(Math.atan2(Math.abs(ab.x*cb.y - ab.y*cb.x), ab.x*cb.x + ab.y*cb.y) * 180 / Math.PI);
}

// Todos los ángulos útiles siempre — sin depender de ejercicio
const ALL_ANGLES = [
  { name:"Codo Izq",   pts:[5,7,9]  },
  { name:"Codo Der",   pts:[6,8,10] },
  { name:"Rod. Izq",   pts:[11,13,15] },
  { name:"Rod. Der",   pts:[12,14,16] },
  { name:"Cad. Izq",   pts:[5,11,13] },
  { name:"Cad. Der",   pts:[6,12,14] },
];

// ── Estado ────────────────────────────────────────────────────────────────
let detector   = null;
let stream     = null;
let rafId      = null;
let camStatus  = "idle";
let camFacing  = "user";
let lastKps    = null;
let lastAngles = [];
let captures   = [];
let sessionRunning = false;
let sessionTimer   = null;
let sessionIdx     = 0;
let totalFotos     = 10;
let intervalSecs   = 3;

// Stepper options
const TIME_OPTS = [0.5, 1, 2, 3, 5, 10, 15, 20];
let timeOptIdx = 3; // default 3s

// ── DOM ───────────────────────────────────────────────────────────────────
const vid          = document.getElementById("vid");
const canvas       = document.getElementById("overlay");
const ctx          = canvas.getContext("2d");
const statusDot    = document.getElementById("statusDot");
const placeholder  = document.getElementById("camPlaceholder");
const flashMsg     = document.getElementById("flashMsg");
const anglesContent= document.getElementById("anglesContent");
const btnStart     = document.getElementById("btnStart");
const btnFlip      = document.getElementById("btnFlip");
const btnCapture   = document.getElementById("btnCapture");
const btnStop      = document.getElementById("btnStop");
const btnDeleteLast= document.getElementById("btnDeleteLast");
const nameSection  = document.getElementById("nameSection");
const sessionName  = document.getElementById("sessionName");
const btnExport    = document.getElementById("btnExport");
const galleryDiv   = document.getElementById("gallery");
const galleryRow   = document.getElementById("galleryRow");
const galCount     = document.getElementById("galCount");
const valFotos     = document.getElementById("valFotos");
const valTime      = document.getElementById("valTime");
const progressFill = document.getElementById("progressFill");

// ── Steppers ──────────────────────────────────────────────────────────────
document.getElementById("btnFotoMinus").addEventListener("click", () => {
  if (totalFotos > 1) { totalFotos--; valFotos.textContent = totalFotos; }
});
document.getElementById("btnFotoPlus").addEventListener("click", () => {
  if (totalFotos < 30) { totalFotos++; valFotos.textContent = totalFotos; }
});
document.getElementById("btnTimeMinus").addEventListener("click", () => {
  if (timeOptIdx > 0) { timeOptIdx--; intervalSecs = TIME_OPTS[timeOptIdx]; valTime.textContent = intervalSecs; }
});
document.getElementById("btnTimePlus").addEventListener("click", () => {
  if (timeOptIdx < TIME_OPTS.length - 1) { timeOptIdx++; intervalSecs = TIME_OPTS[timeOptIdx]; valTime.textContent = intervalSecs; }
});

// ── Status UI ─────────────────────────────────────────────────────────────
function setStatus(s, label) {
  camStatus = s;
  const colors = { idle:"#ff4444", loading:"#FFD700", active:"#00FF88", error:"#ff4444" };
  statusDot.style.color = colors[s] || "#ff4444";
  statusDot.textContent = "● " + (label || s.toUpperCase());
  placeholder.style.display = s === "active" ? "none" : "flex";
  if (s === "loading") placeholder.innerHTML = "CARGANDO MOVENET...<br/><small style='font-size:9px;color:#555'>esperá unos segundos</small>";
  if (s === "error")   placeholder.innerHTML = "ERROR DE CÁMARA<br/><small style='font-size:9px;color:#555'>verificá permisos</small>";
  if (s === "idle")    placeholder.innerHTML = "TOCÁ \"INICIAR CÁMARA\"<br/>PARA COMENZAR";
  btnCapture.disabled = s !== "active";
}

// ── Cámara + MoveNet ──────────────────────────────────────────────────────
async function startCamera() {
  setStatus("loading", "CARGANDO...");
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (rafId)  cancelAnimationFrame(rafId);
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: camFacing, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false
    });
    vid.srcObject = stream; await vid.play();
    if (!detector) {
      detector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
      );
    }
    setStatus("active", "ACTIVO");
    btnStart.textContent = "↺ REINICIAR";
    loop();
  } catch(e) {
    console.error(e);
    setStatus("error", "ERROR");
  }
}

btnStart.addEventListener("click", startCamera);
btnFlip.addEventListener("click", () => {
  camFacing = camFacing === "user" ? "environment" : "user";
  if (camStatus === "active") startCamera();
});

// ── Loop detección ────────────────────────────────────────────────────────
async function loop() {
  if (camStatus !== "active") return;
  try {
    if (vid.readyState >= 2) {
      if (canvas.width !== vid.videoWidth || canvas.height !== vid.videoHeight) {
        canvas.width = vid.videoWidth || 640;
        canvas.height = vid.videoHeight || 480;
      }
      const poses = await detector.estimatePoses(vid);
      if (poses.length > 0) {
        lastKps = poses[0].keypoints;
        lastAngles = getAngles(lastKps);
        drawSkeleton(lastKps);
        renderAngles(lastAngles);
      }
    }
  } catch(e) {}
  rafId = requestAnimationFrame(loop);
}

// ── Dibujar esqueleto ─────────────────────────────────────────────────────
function drawSkeleton(kps) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  BONES.forEach(([i,j]) => {
    const a = kps[i], b = kps[j];
    if (!a || !b || a.score < 0.25 || b.score < 0.25) return;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = "rgba(0,255,136,0.6)"; ctx.lineWidth = 2.5; ctx.stroke();
  });
  kps.forEach((kp, i) => {
    if (!kp || kp.score < 0.25) return;
    ctx.beginPath(); ctx.arc(kp.x, kp.y, 5, 0, Math.PI*2);
    ctx.fillStyle = "#00FF88"; ctx.fill();
    // Mostrar índice de keypoint
    ctx.fillStyle = "rgba(0,255,136,0.5)"; ctx.font = "7px monospace";
    ctx.fillText(i, kp.x + 6, kp.y - 4);
  });
  // Ángulos sobre articulaciones
  ALL_ANGLES.forEach(({ pts }) => {
    const [a,b,c] = pts;
    const A = kps[a], B = kps[b], C = kps[c];
    if (!A||!B||!C||Math.min(A.score,B.score,C.score)<0.25) return;
    const val = calcAngle([A.x,A.y],[B.x,B.y],[C.x,C.y]);
    ctx.font = "bold 12px monospace";
    ctx.strokeStyle="#000"; ctx.lineWidth=2.5;
    ctx.strokeText(val+"°", B.x+5, B.y-5);
    ctx.fillStyle="#00FF88";
    ctx.fillText(val+"°", B.x+5, B.y-5);
  });
  // Brackets decorativos
  [[10,10],[W-10,10],[10,H-10],[W-10,H-10]].forEach(([cx,cy],i) => {
    const sx=i%2===0?1:-1, sy=i<2?1:-1;
    ctx.strokeStyle="#00FF8833"; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(cx,cy+sy*18); ctx.lineTo(cx,cy+sy*3); ctx.lineTo(cx+sx*18,cy+sy*3);
    ctx.stroke();
  });
}

// ── Calcular ángulos ──────────────────────────────────────────────────────
function getAngles(kps) {
  return ALL_ANGLES.map(({ name, pts }) => {
    const [a,b,c] = pts;
    const A = kps[a], B = kps[b], C = kps[c];
    if (!A||!B||!C) return { name, value: null, conf: 0 };
    const conf = Math.min(A.score, B.score, C.score);
    if (conf < 0.2) return { name, value: null, conf: 0 };
    return { name, value: calcAngle([A.x,A.y],[B.x,B.y],[C.x,C.y]), conf: Math.round(conf*100) };
  });
}

// ── Render ángulos panel ──────────────────────────────────────────────────
function renderAngles(angles) {
  const visible = angles.filter(a => a.value !== null);
  if (visible.length === 0) { anglesContent.innerHTML = '<div style="font-size:9px;color:#222;letter-spacing:2px">— sin detección —</div>'; return; }
  anglesContent.innerHTML = visible.map(a =>
    `<div class="angleRow">
      <div class="angleName">${a.name}</div>
      <div><span class="angleVal">${a.value}°</span><span class="angleConf">${a.conf}%</span></div>
    </div>`
  ).join("");
}

// ── Flash helper ──────────────────────────────────────────────────────────
function showFlash(cls, text, ms) {
  flashMsg.className = cls;
  flashMsg.textContent = text;
  flashMsg.style.display = "block";
  if (ms) setTimeout(() => flashMsg.style.display = "none", ms);
}

// ── Snapshot ──────────────────────────────────────────────────────────────
function takeSnapshot(idx) {
  const tmp = document.createElement("canvas");
  tmp.width = canvas.width || 640; tmp.height = canvas.height || 480;
  const tctx = tmp.getContext("2d");
  tctx.drawImage(vid, 0, 0, tmp.width, tmp.height);
  tctx.drawImage(canvas, 0, 0);
  const imgData = tmp.toDataURL("image/jpeg", 0.90);
  const raw_kps = lastKps ? lastKps.map(k => ({ x: Math.round(k.x), y: Math.round(k.y), score: Math.round(k.score * 1000) / 1000 })) : [];
  const capData = {
    idx,
    timestamp: new Date().toISOString(),
    angles: lastAngles.filter(a => a.value !== null),
    keypoints: raw_kps,
  };
  captures.push({ imgData, data: capData, id: Date.now() });
  renderGallery();
  showFlash("snap", `📸 ${idx} / ${totalFotos}`, 600);
  playTone("snap");
  progressFill.style.width = `${(idx / totalFotos) * 100}%`;
}

// ── Sesión automática ─────────────────────────────────────────────────────
btnCapture.addEventListener("click", startSession);

function startSession() {
  if (sessionRunning) return;
  sessionRunning = true;
  sessionIdx = 0;
  btnCapture.disabled = true;
  btnStop.style.display = "block";
  nameSection.style.display = "none";
  progressFill.style.width = "0%";

  // Countdown 10s
  let count = 10;
  showFlash("countdown", count);
  playTone("countdown");
  const cdInterval = setInterval(() => {
    count--;
    if (count > 0) {
      showFlash("countdown", count);
      if (count <= 3) playTone("countdown");
    } else {
      clearInterval(cdInterval);
      flashMsg.style.display = "none";
      runNextCapture();
    }
  }, 1000);

  function runNextCapture() {
    if (!sessionRunning) return;
    sessionIdx++;
    takeSnapshot(sessionIdx);

    if (sessionIdx >= totalFotos) {
      endSession(true);
      return;
    }

    // Programar próxima captura
    const ms = intervalSecs * 1000;
    const warnAt = Math.min(2000, ms - 200); // aviso 2s antes (o menos si intervalo corto)

    if (warnAt > 100) {
      sessionTimer = setTimeout(() => {
        if (!sessionRunning) return;
        playTone("warn");
        showFlash("warn", "PREPARATE...", warnAt - 100);
      }, ms - warnAt);
    }

    sessionTimer = setTimeout(() => {
      if (!sessionRunning) return;
      runNextCapture();
    }, ms);
  }
}

function endSession(completed) {
  sessionRunning = false;
  clearTimeout(sessionTimer);
  btnStop.style.display = "none";
  btnCapture.disabled = false;
  btnCapture.textContent = "📸 NUEVA SESIÓN (10s)";
  progressFill.style.width = completed ? "100%" : progressFill.style.width;
  if (completed) {
    showFlash("snap", "✓ SESIÓN COMPLETA", 1200);
    playTone("done");
  }
  if (captures.length > 0) {
    nameSection.style.display = "flex";
    btnDeleteLast.style.display = "block";
    galleryDiv.style.display = "block";
  }
}

btnStop.addEventListener("click", () => {
  endSession(false);
  flashMsg.style.display = "none";
});

// ── Borrar última ─────────────────────────────────────────────────────────
btnDeleteLast.addEventListener("click", () => {
  if (captures.length === 0) return;
  captures.pop();
  playTone("delete");
  renderGallery();
  if (captures.length === 0) {
    nameSection.style.display = "none";
    btnDeleteLast.style.display = "none";
    galleryDiv.style.display = "none";
  }
  // Actualizar progress
  progressFill.style.width = totalFotos > 0 ? `${(captures.length / totalFotos) * 100}%` : "0%";
});

// ── Galería ───────────────────────────────────────────────────────────────
function renderGallery() {
  galCount.textContent = `${captures.length} / ${totalFotos}`;
  galleryRow.innerHTML = "";
  captures.forEach((cap, i) => {
    const card = document.createElement("div"); card.className = "capCard";
    const angLines = cap.data.angles.slice(0, 4)
      .map(a => `<div class="capAngLine"><span>${a.name}</span><span>${a.value}°</span></div>`).join("");
    card.innerHTML = `
      <img src="${cap.imgData}" alt=""/>
      <div class="capInfo">
        <div class="capIdx">#${cap.data.idx}</div>
        ${angLines}
      </div>
      <div class="capDel" data-i="${i}" title="Borrar esta">✕</div>`;
    galleryRow.appendChild(card);
  });
  // Borrar una específica
  document.querySelectorAll(".capDel").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = parseInt(btn.dataset.i);
      captures.splice(i, 1);
      playTone("delete");
      renderGallery();
      if (captures.length === 0) {
        nameSection.style.display = "none";
        btnDeleteLast.style.display = "none";
        galleryDiv.style.display = "none";
      }
    });
  });
}

// ── Exportar JSON ─────────────────────────────────────────────────────────
btnExport.addEventListener("click", () => {
  if (captures.length === 0) return;
  const name = (sessionName.value.trim() || "pose_session").replace(/\s+/g, "_");
  const exportData = {
    session_name: name,
    exported_at: new Date().toISOString(),
    total_captures: captures.length,
    interval_seconds: intervalSecs,
    frames: captures.map(c => c.data),
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${name}_${Date.now()}.json`;
  a.click();
});
</script>
</body>
</html>
